# Sample caller workflow for an app repo (delegated deploy).
#
# Copy this into your app repo at .github/workflows/deploy.yml. It never holds
# deploy credentials or Azure identity — it only dispatches to the central
# control repo (vgmello/cloud-app), which runs the deploy under its own identity
# after the stack-lock registry authorizes this repo.
#
# Required in this repo's settings:
#   - vars.DEPLOY_APP_ID          GitHub App id (App installed on the control repo)
#   - secrets.DEPLOY_APP_KEY      GitHub App private key (.pem contents)
name: Deploy

on:
  push:
    branches: [main] # merge to main -> deploy dev automatically
  workflow_dispatch: # manual run -> pick the environment
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, staging, prod]
        default: dev

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deploy to control plane
        uses: vgmello/cloud-app/.github/actions/cloud-app@main
        with:
          app-id: ${{ vars.DEPLOY_APP_ID }}
          app-private-key: ${{ secrets.DEPLOY_APP_KEY }}
          # Control repo owner (target-repo defaults to "cloud-app"):
          target-owner: vgmello
          # This stack: stack-name must match `name:` in cloud-app.yml.
          stack-name: orders-api
          env: ${{ inputs.environment || 'dev' }}
          # `repo` and `stack-file` default to this repo's name and cloud-app.yml.
