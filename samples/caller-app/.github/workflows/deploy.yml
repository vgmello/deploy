name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, staging, prod]
        default: dev

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dispatch deploy to control plane
        uses: vgmello/cloud-app/.github/actions/cloud-app@main
        with:
          app-id: ${{ vars.DEPLOY_APP_ID }}
          app-private-key: ${{ secrets.DEPLOY_APP_KEY }}
          env: ${{ inputs.environment || 'dev' }}
