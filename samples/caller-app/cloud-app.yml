# Sample stack manifest for an app repo (delegated deploy).
# Lives at the caller repo root as cloud-app.yml. `name` is the stack name and
# must match the `stack-name` passed to the dispatch action.
name: orders-api

apps:
  api:
    port: 8080
    ingress: internal # private by default; use `public` to expose externally
    replicas: { min: 1, max: 3 }
    docker:
      file: ./Dockerfile
      context: .
    secrets:
      - STRIPE_KEY # value pulled from the platform Key Vault at deploy time

database:
  size: small
  public_access: false

environments:
  dev: {} # inherits everything above
  prod:
    apps:
      api:
        replicas: { min: 2, max: 10 }
    database:
      size: medium
