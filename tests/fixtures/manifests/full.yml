name: orders-api
type: container-app

app:
  port: 8080
  ingress: internal
  cpu: 0.5
  memory: 1Gi
  replicas: { min: 1, max: 3 }
  docker:
    file: ./Dockerfile
    context: .
  env:
    LOG_LEVEL: info
  secrets:
    - STRIPE_KEY

database:
  size: small
  storage_gb: 32
  public_access: false

storage:
  containers: [uploads]
  public_access: false

environments:
  dev: {}
  prod:
    app:
      replicas: { min: 2, max: 10 }
      env: { LOG_LEVEL: warn }
    database:
      size: medium
