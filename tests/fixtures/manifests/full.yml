name: orders-api

apps:
  api:
    port: 8080
    ingress: internal
    cpu: 0.5
    memory: 1Gi
    replicas: { min: 1, max: 3 }
    docker:
      file: ./Dockerfile
      context: .
    env:
      LOG_LEVEL: info
    secrets:
      - STRIPE_KEY
  worker:
    ingress: none

functions:
  processor:
    env:
      QUEUE: jobs

database:
  size: small
  storage_gb: 32
  public_access: false

storage:
  containers: [uploads]
  public_access: false

environments:
  dev: {}
  prod:
    apps:
      api:
        replicas: { min: 2, max: 10 }
        env: { LOG_LEVEL: warn }
    database:
      size: medium
