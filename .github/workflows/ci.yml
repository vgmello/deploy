name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: python3 -m pip install --user -q -r engine/requirements-dev.txt

      - name: Run tests
        working-directory: engine
        run: python3 -m pytest tests/py -q --cov=cloudapp --cov-report=term-missing --cov-fail-under=90

      - name: Lint workflows
        run: |
          curl -sSL https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz | tar xz actionlint
          ./actionlint -color

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format
        run: terraform -chdir=terraform/azure fmt -check -recursive

      - name: Validate
        run: |
          terraform -chdir=terraform/azure init -backend=false -input=false
          terraform -chdir=terraform/azure validate

      - name: Fixtures in sync
        run: |
          python3 -m pip install --user -q -r engine/requirements.txt
          python3 engine/generate_tf_fixtures.py
          git diff --exit-code terraform/azure/tests/fixtures

      - name: Terraform tests
        run: terraform -chdir=terraform/azure test

      - name: Bootstrap stacks (fmt, validate, test)
        run: |
          for dir in terraform/azure/subscription-bootstrap terraform/azure/bootstrap; do
            terraform -chdir="$dir" fmt -check -recursive
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate
            terraform -chdir="$dir" test
          done

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.53.0

      - name: tflint
        run: |
          tflint --init --chdir=terraform/azure --config="$(pwd)/.tflint.hcl"
          tflint --chdir=terraform/azure --recursive --config="$(pwd)/.tflint.hcl"
