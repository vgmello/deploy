name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: python3 -m pip install --user -q -r requirements-dev.txt

      - name: Run tests
        run: python3 -m pytest tests/py -q --cov=cloudtool --cov-report=term-missing --cov-fail-under=90

      - name: Lint workflows
        run: |
          curl -sSL https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz | tar xz actionlint
          ./actionlint -color

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Validate
        run: |
          terraform -chdir=terraform init -backend=false -input=false
          terraform -chdir=terraform validate

      - name: Fixtures in sync
        run: |
          python3 -m pip install --user -q -r requirements.txt
          python3 scripts/generate_tf_fixtures.py
          git diff --exit-code terraform/tests/fixtures

      - name: Terraform tests
        run: terraform -chdir=terraform test

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.53.0

      - name: tflint
        run: |
          tflint --init --chdir=terraform --config="$(pwd)/.tflint.hcl"
          tflint --chdir=terraform --recursive --config="$(pwd)/.tflint.hcl"
