          environment: ${{ env.DEPLOY_ENV }}
          platform-file: ${{ steps.platform.outputs.file }}
          plan-only: ${{ inputs.plan_only }}

      - shell: bash
        run: echo "### ${{ steps.deploy.outputs.summary }}" >> "$GITHUB_STEP_SUMMARY"
