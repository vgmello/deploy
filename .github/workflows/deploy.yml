          keyvault-name: ${{ steps.platform.outputs.keyvault }}
          require-vault: "true"

      - id: deploy
        uses: ./.deploy/.github/actions/terraform-deploy
        with:
          terraform-dir: .deploy/terraform
          tfvars-file: tfvars.json
