            exit 1
          fi
          {
            echo "file=$FILE"
            echo "client_id=$(yq '.deploy.client_id' "$FILE")"
            echo "tenant_id=$(yq '.tenant_id' "$FILE")"
            echo "subscription_id=$(yq '.subscription_id' "$FILE")"
            PREFIX=$(yq '.naming_prefix // ""' "$FILE")
            KV=$(python3 -c "import sys; n = ('kv-' + sys.argv[1] + sys.argv[2] + '-' + sys.argv[3])[:24]; print(n[:-1] if n.endswith('-') else n)" "$PREFIX" "${{ needs.setup.outputs.name }}" "$DEPLOY_ENV")
            echo "keyvault=$KV"
          } >> "$GITHUB_OUTPUT"

      - uses: azure/login@v2
        with:
          client-id: ${{ steps.platform.outputs.client_id }}
          tenant-id: ${{ steps.platform.outputs.tenant_id }}
          subscription-id: ${{ steps.platform.outputs.subscription_id }}

      - id: resolve
        uses: ./.deploy/.github/actions/resolve-config
        with:
          tool-json: .cloud-tool/tool.${{ env.DEPLOY_ENV }}.json
          environment: ${{ env.DEPLOY_ENV }}
          platform-config-dir: .deploy/environments
