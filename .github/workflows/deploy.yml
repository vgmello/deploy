          plan-only: ${{ inputs.plan_only }}

      - shell: bash
        run: echo "### ${{ steps.deploy.outputs.summary }}" >> "$GITHUB_STEP_SUMMARY"

  deploy-3:
    needs: [setup, build, deploy-2]
    if: ${{ !failure() && !cancelled() && fromJSON(needs.setup.outputs.environments)[3] != null && (inputs.environment == '' || inputs.environment == fromJSON(needs.setup.outputs.environments)[3]) && !(inputs.plan_only && inputs.environment == '') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ fromJSON(needs.setup.outputs.environments)[3] }}
    env:
      DEPLOY_ENV: ${{ fromJSON(needs.setup.outputs.environments)[3] }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: vgmello/deploy
