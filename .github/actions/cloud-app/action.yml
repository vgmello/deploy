name: 'cloud-app'
description: 'The single action an app repo uses to deploy. Reads the stack name from the manifest, generates a GitHub App token, then dispatches and waits on the control-plane deploy for one environment.'

inputs:
  app-id:
    description: 'GitHub App ID'
    required: true
  app-private-key:
    description: 'GitHub App Private Key (.pem contents)'
    required: true

  repo:
    description: 'Caller repository name (Defaults to the current repository name)'
    required: false
    default: ''
  stack-file:
    description: 'Stack manifest path in the caller repo (Defaults to "cloud-app.yml"). The stack name is read from its top-level `name:`.'
    required: false
    default: 'cloud-app.yml'
  branch:
    description: 'Caller branch to deploy'
    required: false
    default: 'main'
  env:
    description: 'Target deployment environment'
    required: false
    default: 'dev'

  # Target (control-plane) overrides — sensible defaults for vgmello/cloud-app.
  target-owner:
    description: 'Control-plane owner/org (Defaults to the caller repository owner)'
    required: false
    default: ''
  target-repo:
    description: 'Control-plane repository name'
    required: false
    default: 'cloud-app'
  target-workflow:
    description: 'Control-plane dispatch-target workflow filename'
    required: false
    default: 'cloud-app.yml'
  target-branch:
    description: 'Control-plane branch to run the deploy from'
    required: false
    default: 'main'

outputs:
  deployment_url:
    description: 'URL of the deployed app, if the target produced one'
    value: ${{ steps.dispatch.outputs.deployment_url }}
  status:
    description: 'Outcome of the target deploy'
    value: ${{ steps.dispatch.outputs.status }}
  deployed_at:
    description: 'UTC timestamp of the target deployment'
    value: ${{ steps.dispatch.outputs.deployed_at }}
  stack_name:
    description: 'Deployed stack name'
    value: ${{ steps.resolve-stack.outputs.stack_name }}
  environment:
    description: 'Target environment'
    value: ${{ inputs.env }}

runs:
  using: 'composite'
  steps:
    - name: Prepare inputs & defaults
      id: prepare-inputs
      shell: bash
      run: |
        # Owner (defaults to caller repository owner)
        OWNER="${{ inputs.target-owner }}"
        [ -z "$OWNER" ] && OWNER="${{ github.repository_owner }}"
        echo "owner=$OWNER" >> "$GITHUB_OUTPUT"

        # Caller repo name (defaults to the current repository name)
        CALLER_REPO="${{ inputs.repo }}"
        [ -z "$CALLER_REPO" ] && CALLER_REPO="${{ github.event.repository.name }}"
        echo "caller_repo=$CALLER_REPO" >> "$GITHUB_OUTPUT"

        # The stack name comes from the manifest, so the caller repo must be on
        # disk. Check it out only if it isn't already (avoids clobbering a
        # workspace the caller checked out themselves).
        if [ -f "${{ inputs.stack-file }}" ]; then
          echo "checkout_needed=false" >> "$GITHUB_OUTPUT"
        else
          echo "checkout_needed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout caller repo (to read the stack name)
      if: steps.prepare-inputs.outputs.checkout_needed == 'true'
      uses: actions/checkout@v4

    - name: Resolve stack name from manifest
      id: resolve-stack
      shell: bash
      run: |
        STACK_FILE="${{ inputs.stack-file }}"
        if [ ! -f "$STACK_FILE" ]; then
          echo "::error::manifest '$STACK_FILE' not found; cannot derive the stack name"
          exit 1
        fi
        # First top-level `name:`; drop inline comment and surrounding quotes/space.
        STACK_NAME=$(grep -m1 '^name:' "$STACK_FILE" \
          | sed -e 's/^name:[[:space:]]*//' -e 's/[[:space:]]*#.*$//' \
                -e 's/^["'\'']//' -e 's/["'\'']$//' -e 's/[[:space:]]*$//')
        if [ -z "$STACK_NAME" ]; then
          echo "::error::could not read a top-level 'name:' from '$STACK_FILE'"
          exit 1
        fi
        echo "stack_name=$STACK_NAME" >> "$GITHUB_OUTPUT"

    - name: Generate GitHub App token
      id: generate-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}
        owner: ${{ steps.prepare-inputs.outputs.owner }}
        repositories: ${{ inputs.target-repo }}

    # Orchestrate the dispatch by calling the shared script directly via
    # github.action_path (resolves to this repo's checkout under _actions), not
    # by `uses:` a local sibling action — a `./` ref would resolve against the
    # consumer's workspace. This is the pattern for every engine step here.
    - name: Dispatch and poll the control-plane deploy
      id: dispatch
      shell: bash
      env:
        GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        TARGET_OWNER: ${{ steps.prepare-inputs.outputs.owner }}
        TARGET_REPO: ${{ inputs.target-repo }}
        TARGET_WORKFLOW: ${{ inputs.target-workflow }}
        TARGET_BRANCH: ${{ inputs.target-branch }}

        INPUT_REPO: ${{ steps.prepare-inputs.outputs.caller_repo }}
        INPUT_STACK_FILE: ${{ inputs.stack-file }}
        INPUT_STACK_NAME: ${{ steps.resolve-stack.outputs.stack_name }}
        INPUT_BRANCH: ${{ inputs.branch }}
        INPUT_ENV: ${{ inputs.env }}
      run: python ${{ github.action_path }}/../../scripts/dispatch_and_wait.py

    - name: Post summary to caller workflow
      if: always()
      shell: bash
      run: |
        cat <<EOF >> "$GITHUB_STEP_SUMMARY"
        ### Target Deployment Summary
        - **Target Repository:** \`${{ inputs.target-repo }}\`
        - **Stack Name:** \`${{ steps.resolve-stack.outputs.stack_name }}\`
        - **Environment:** \`${{ inputs.env }}\`
        - **Caller Branch:** \`${{ inputs.branch }}\`
        - **[View Target Workflow Execution Logs](${{ env.TARGET_RUN_URL }})**
        EOF
