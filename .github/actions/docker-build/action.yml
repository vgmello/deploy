name: docker-build
description: Build and push one image per unique (dockerfile, context) and emit the image_tags map Terraform consumes
inputs:
  tool-json:
    description: Path to a tool.<env>.json (docker config must not vary per env)
    required: true
  tool-name:
    description: Tool name
    required: true
  registry:
    description: ACR login server
    required: true
  git-sha:
    description: Image tag (git sha)
    required: true
outputs:
  image-tags:
    description: JSON map <key> -> full image reference
    value: ${{ steps.build.outputs.image-tags }}
runs:
  using: composite
  steps:
    - shell: bash
      run: pip install -q -r "${{ github.action_path }}/../../../engine/requirements.txt"

    - id: build
      shell: bash
      run: >-
        PYTHONPATH="${{ github.action_path }}/../../../engine"
        python3 -m cloudapp docker-build
        --tool-json "${{ inputs.tool-json }}"
        --tool-name "${{ inputs.tool-name }}"
        --registry "${{ inputs.registry }}"
        --git-sha "${{ inputs.git-sha }}"
