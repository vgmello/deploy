name: resolve-config
description: Merge per-environment tool config with platform environment config into tfvars.json
inputs:
  tool-json:
    description: Path to tool.<env>.json produced by parse-manifest
    required: true
  environment:
    description: Environment name
    required: true
  platform-config-dir:
    description: Directory in the deploy repo containing <env>.yml platform configs
    default: environments
  out-file:
    description: Path to write the tfvars JSON file
    default: tfvars.json
outputs:
  tfvars-file:
    description: Path of the written tfvars JSON file
    value: ${{ inputs.out-file }}
runs:
  using: composite
  steps:
    - shell: bash
      run: pip install -q -r "${{ github.action_path }}/../../../requirements.txt"

    - shell: bash
      run: >-
        PYTHONPATH="${{ github.action_path }}/../../.."
        python3 -m cloudtool resolve-config
        --tool-json "${{ inputs.tool-json }}"
        --platform-file "${{ inputs.platform-config-dir }}/${{ inputs.environment }}.yml"
        --environment "${{ inputs.environment }}"
        --out-file "${{ inputs.out-file }}"
