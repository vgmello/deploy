name: parse-manifest
description: Validate .cloud-app.yml against the schema and merge per-environment tool config
inputs:
  manifest:
    description: Path to the manifest in the app repo
    default: .cloud-app.yml
  output-dir:
    description: Directory to write merged per-environment tool JSON files
    default: .cloud-app
  app-root:
    description: App repo root, used for Dockerfile detection
    default: "."
outputs:
  name:
    description: Tool name
    value: ${{ steps.parse.outputs.name }}
  environments:
    description: JSON array of environment names
    value: ${{ steps.parse.outputs.environments }}
  docker:
    description: Whether a docker image build is required (true/false)
    value: ${{ steps.parse.outputs.docker }}
runs:
  using: composite
  steps:
    - shell: bash
      run: pip install -q -r "${{ github.action_path }}/../../../requirements.txt"

    - id: parse
      shell: bash
      run: >-
        PYTHONPATH="${{ github.action_path }}/../../.."
        python3 -m cloudapp parse-manifest
        --manifest "${{ inputs.manifest }}"
        --output-dir "${{ inputs.output-dir }}"
        --app-root "${{ inputs.app-root }}"
