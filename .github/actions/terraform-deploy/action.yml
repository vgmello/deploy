name: terraform-deploy
description: Init with azurerm backend, plan, and (unless plan-only) apply the platform Terraform for one environment
inputs:
  terraform-dir:
    description: Path to the platform terraform root (checked-out deploy repo)
    required: true
  tfvars-file:
    description: tfvars.json produced by resolve-config
    required: true
  image-tags:
    description: JSON map <key> -> image reference from docker-build
    default: "{}"
  tool-json:
    description: tool.<env>.json, used to derive placeholder tags for plan-only runs
    required: true
  tool-name:
    description: Tool name (state key prefix)
    required: true
  environment:
    description: Environment name
    required: true
  platform-file:
    description: Platform env yml (backend + runner_access)
    required: true
  plan-only:
    description: Plan without applying
    default: "false"
  targets:
    description: Space-separated -target addresses for a partial apply
    default: ""
outputs:
  summary:
    description: One-line plan/apply summary
    value: ${{ steps.deploy.outputs.summary }}
runs:
  using: composite
  steps:
    - shell: bash
      run: pip install -q -r "${{ github.action_path }}/../../../requirements.txt"

    - id: deploy
      shell: bash
      env:
        TF_IN_AUTOMATION: "true"
        IMAGE_TAGS: ${{ inputs.image-tags }}
        TARGETS: ${{ inputs.targets }}
      run: >-
        PYTHONPATH="${{ github.action_path }}/../../.."
        python3 -m cloudtool terraform-deploy
        --terraform-dir "${{ inputs.terraform-dir }}"
        --tfvars-file "${{ inputs.tfvars-file }}"
        --tool-json "${{ inputs.tool-json }}"
        --tool-name "${{ inputs.tool-name }}"
        --environment "${{ inputs.environment }}"
        --platform-file "${{ inputs.platform-file }}"
        --image-tags "$IMAGE_TAGS"
        --targets "$TARGETS"
        ${{ inputs.plan-only == 'true' && '--plan-only' || '' }}
